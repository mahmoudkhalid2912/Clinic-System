<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset Code</title>
</head>

<body style="background:#f5f7fa;font-family:Segoe UI,Arial,sans-serif;padding:40px">

    <table width="100%" cellspacing="0" cellpadding="0">
        <tr>
            <td align="center">

                <table width="420" style="background:white;border-radius:10px;padding:40px;text-align:center">

                    <tr>
                        <td>
                            <h2 style="margin-bottom:10px;color:#2c3e50">
                                VitalCore Clinic
                            </h2>
                        </td>
                    </tr>

                    <tr>
                        <td>

                            <p style="color:#555;font-size:16px">
                                Hello <b>{{name}}</b>
                            </p>

                            <p style="color:#666;font-size:14px">
                                Use the verification code below to reset your password
                            </p>

                            <div style="margin:30px 0;font-size:32px;letter-spacing:8px;font-weight:bold;color:#1e2b37">
                                {{code}}
                            </div>

                            <p style="color:#888;font-size:13px">
                                This code will expire in 10 minutes
                            </p>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
